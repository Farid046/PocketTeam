name: Docker Multi-Arch Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g. 1.0.28)"
        required: true
      push_latest:
        description: "Also push :latest tag"
        required: false
        default: "true"

jobs:
  docker-release:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: farid046
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Strip leading 'v' from tag name
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute Docker tags
        id: tags
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PUSH_LATEST="${{ github.event.inputs.push_latest }}"
          # Default to "true" on tag push (no input override)
          if [ "${{ github.event_name }}" = "push" ]; then
            PUSH_LATEST="true"
          fi
          TAGS="farid046/pocketteam-dashboard:${VERSION}"
          if [ "${PUSH_LATEST}" = "true" ]; then
            TAGS="${TAGS},farid046/pocketteam-dashboard:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

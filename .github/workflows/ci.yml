name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Run tests
        run: >-
          pytest tests/
          --ignore=tests/sdk_integration
          --ignore=tests/test_browser_tools.py
          --ignore=tests/test_insights_scheduler.py
          -v --tb=short
          --deselect=tests/test_cli_help.py::TestHelpCommand::test_help_shows_version

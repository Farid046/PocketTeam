name: PocketTeam SDK Integration Tests

on:
  pull_request:
    paths:
      - 'pocketteam/**'
      - 'tests/sdk_integration/**'
  push:
    branches: [main]
    paths:
      - 'pocketteam/**'
      - 'tests/sdk_integration/**'
  workflow_dispatch:
    inputs:
      run_live:
        description: 'Run live SDK tests (uses API credits)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  sdk-tests-mock:
    name: SDK Tests (Mock)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" --quiet

      - name: Run fake app tests
        run: |
          pytest tests/sdk_integration/test_fake_app.py -v --tb=short

      - name: Run healer integration tests (mocked SDK)
        run: |
          pytest tests/sdk_integration/test_healer_integration.py -v --tb=short

  sdk-tests-live:
    name: SDK Tests (Live)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.inputs.run_live == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" --quiet

      - name: Run live SDK tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pytest tests/sdk_integration/test_healer_live.py -v --tb=short
